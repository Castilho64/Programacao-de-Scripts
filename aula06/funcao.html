        function convertReaisparaDolar(valor, dolar){
            return 'US$ ' + (valor / dolar).toFixed(2).replace('.',',') + '<br>'
        } //Forma Indepedente

        function convertRealDolar(valor, dolar){
            document.write('US$ ' + (valor / dolar).toFixed(2).replace('.',',') + '<br>')
        } //Forma vinculada ao Document.Write

        document.write(convertReaisparaDolar(10000, cot_dolar))
        document.write(convertReaisparaDolar(12000, cot_dolar))
        document.write(convertReaisparaDolar(15000, cot_dolar))
