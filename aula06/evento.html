<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 - Evento</title>
    <script type = "text/javascript">

        // Converte Reais para Dólar (divide o valor pelo preço do dólar)
        function convertReaisparaDolar(valor, dolar){
            return 'US$ ' + (valor / dolar).toFixed(2).replace('.',',') + '<br>'
        }

        // Converte Dólar para Reais (multiplica o valor pelo preço do dólar)
        function convertDolarparaReal(dolar, valor){
            return 'R$ ' + (dolar * valor).toFixed(2).replace('.', ',') + '<br>'
        }

        // Aguarda o carregamento completo da página para ligar o evento ao botão
        window.onload = function (){
            document.getElementById('btn_converter').onclick = function(){

                // Captura os valores dos campos da página
                let dolar = document.getElementById('dolar').value 
                let valor = document.getElementById('valor').value
                let tipo = document.getElementById('tipo').value // Captura a opção selecionada (1 ou 2)

                let resultado = ''

                // Verifica qual conversão foi selecionada e chama a função correspondente
                if(tipo == '1'){
                    resultado = convertReaisparaDolar(valor, dolar) // Opção 1: Real → Dólar
                } else {
                    resultado = convertDolarparaReal(dolar, valor)  // Opção 2: Dólar → Real
                }

                // Exibe o resultado na página
                document.getElementById('resultado').innerHTML = 'Resultado: ' + resultado
            }
        }//Função ligada com Evento

    </script>
</head>
<body>
    <h1>Conversão Real / Dolar</h1>
    <b>Dólar: </b><input type="number" id="dolar" value = "5.19"><br><br>
    <b>Valor: </b><input type="number" id="valor"><br><br>
    <!--button onclick="alert('Ok')">Converter</!--button-->
    <select id="tipo">
        <option value="1">Real para Dólar</option>
        <option value="2">Dólar para Real</option>
    </select>
    <button id="btn_converter">Converter</button>
    <p><b id="resultado">Resultado: </b></p>
</body>
</html>
